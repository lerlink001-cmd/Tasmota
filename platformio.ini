; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter, extra scripting
;   Upload options: custom port, speed and extra flags
;   Library options: dependencies, extra library storages
;
; Please visit documentation for the other options and examples
; http://docs.platformio.org/en/stable/projectconf.html
;
; *********************************************************************
; *** Selection of Tasmota build variant is done with VSC
; *** alternatively can be done in: platformio_override.ini
; *** See example: platformio_override_sample.ini
; *********************************************************************

[platformio]
description                 = Provide ESP8266 / ESP32 based devices with Web, MQTT and OTA firmware
src_dir                     = tasmota
lib_dir                     = lib/default
boards_dir                  = boards
build_cache_dir             = .cache
extra_configs               = platformio_tasmota32.ini
                              platformio_tasmota_env.ini
                              platformio_tasmota_env32.ini
                              platformio_override.ini
                              platformio_tasmota_cenv.ini

[common]
platform                    = ${core.platform}
platform_packages           = ${core.platform_packages}
framework                   = arduino
board                       = esp8266_1M
board_build.filesystem      = littlefs
board_build.littlefs_version = 2.0
board_build.variants_dir    = variants/tasmota
custom_unpack_dir           = unpacked_littlefs
build_unflags               = ${core.build_unflags}
build_flags                 = ${core.build_flags}
monitor_speed               = 115200
monitor_echo                = yes
; *** Upload Serial reset method for Wemos and NodeMCU
upload_resetmethod          = nodemcu
check_skip_packages         = yes
extra_scripts               = ${esp_defaults.extra_scripts}
lib_archive                 = no
lib_ldf_mode                = chain
lib_compat_mode             = strict
shared_libdeps_dir          = lib
lib_extra_dirs              =
                              lib/lib_basic
                              lib/lib_i2c
                              lib/lib_display
                              lib/lib_ssl
                              lib/lib_audio
                              lib/lib_rf
                              lib/lib_div

[tasmota]
build_unflags               =
build_flags                 =

; *********************************************************************
; 🔥 【你唯一需要编译的标准环境】🔥
; *********************************************************************
[env:tasmota-4M]
extends                     = esp8266_4M
board                       = esp8266_4M
build_flags                 = ${esp82xx_defaults.build_flags}

[scripts_defaults]
extra_scripts               = pre:pio-tools/pre_source_dir.py
                              pre:pio-tools/set_partition_table.py
                              pre:pio-tools/override_copy.py
                              pre:pio-tools/compress-html.py
                              pre:pio-tools/port-vsc.py
                              post:pio-tools/strip-flags.py

[esp_defaults]
extra_scripts               = post:pio-tools/name-firmware.py
                              post:pio-tools/gzip-firmware.py
                              post:pio-tools/metrics-firmware.py
                              pre:pio-tools/custom_target.py
                              ${scripts_defaults.extra_scripts}
build_unflags               = ${tasmota.build_unflags}
                               -Wall
                              -Wdeprecated-declarations
build_flags                 = ${tasmota.build_flags}
                              -DCORE_DEBUG_LEVEL=0
                              -Wl,-Map,firmware.map
                              -Wno-deprecated-declarations
                              -mtarget-align
                              -free
                              -fipa-pta
                              -Wreturn-type
                              -DTASMOTA
; *********************************************************************
; *** Use custom settings from file user_config_override.h
                              -DUSE_CONFIG_OVERRIDE
; *********************************************************************

[esp82xx_defaults]
extra_scripts               = ${esp_defaults.extra_scripts}
build_flags                 = ${esp_defaults.build_flags}
                              -DNDEBUG
                              -DFP_IN_IROM
                              -DBEARSSL_SSL_BASIC
                              -DPIO_FRAMEWORK_ARDUINO_ESPRESSIF_SDK22x_190703
                              -DPIO_FRAMEWORK_ARDUINO_LWIP2_HIGHER_BANDWIDTH_LOW_FLASH
                              -DVTABLES_IN_FLASH
                              -DPSTR_ALIGN=1
                              -DMIMETYPE_MINIMAL
                              -Wl,--wrap=sntp_init
                              -Wl,--wrap=sntp_stop
lib_ignore                  = ESP8266Audio
                              ESP8266SAM
                              ESP8266LLMNR
                              ESP8266NetBIOS
                              ESP8266SSDP
                              ESP8266WiFiMesh
                              GDBStub
                              ESP8266HTTPUpdateServer
                              SPISlave
                              Hash
                              ArduinoOTA

[core]
platform                    = https://github.com/tasmota/platform-espressif8266/releases/download/2026.03.00/platform-espressif8266.zip
platform_packages           =
build_unflags               = ${esp_defaults.build_unflags}
build_flags                 = ${esp82xx_defaults.build_flags}
                              -DWAVEFORM_LOCKED_PWM
