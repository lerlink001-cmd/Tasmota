; 核心：只启用ESP8266编译环境，屏蔽所有ESP32/C3相关
[platformio]
default_envs = tasmota-ir
env_default = tasmota-ir  ; 双重锁定默认编译目标

; 屏蔽ESP32/C3所有编译环境（关键！避免工作流调用）
[env:tasmota32]
platform = disabled
[env:tasmota32c3]
platform = disabled
[env:tasmota32s2]
platform = disabled
[env:tasmota32s3]
platform = disabled

; ESP8266红外固件编译配置（完整、无报错）
[env:tasmota-ir]
extends = env:tasmota
board = esp8266_4m  ; 通用ESP8266 4M Flash（1M Flash改esp01_1m）
framework = arduino
platform = espressif8266 @ 3.2.0  ; 固定平台版本，避免兼容问题
build_flags = 
  ${env:tasmota.build_flags}
  -DMODULE_IR=1          ; 强制启用红外模块
  -DCFG_HOLDER=999889    ; 你的自定义配置
  -DFIRMWARE_TYPE="ESP8266-IR-V1.0"  ; 自定义固件名称
lib_deps = 
  ${env:tasmota.lib_deps}
  IRremoteESP8266@2.8.4  ; 显式指定红外库版本，避免报错
