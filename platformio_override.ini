[env:tasmota-4M]
extends = env:tasmota
board = esp8266_4M
build_flags =
  ${env:tasmota.build_flags}
  -DUSE_CONFIG_OVERRIDE  ; 🔴 强制启用配置覆盖，确保 user_config_override.h 生效
  -DMODULE=0
  -DDEFAULT_TEMPLATE="{\"NAME\":\"Lerlink_ESP8266_IR\",\"GPIO\":[32,0,0,0,105,108,0,0,0,57,0,0,0,0,0,0,0],\"FLAG\":0,\"BASE\":1}"
  -DTEMPLATE_AUTODETECT=0
  -DCFG_HOLDER=999889


[env:tasmota-4M]
extends = env:tasmota
build_flags =
  ${env:tasmota.build_flags}
