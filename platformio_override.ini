[platformio]
default_envs = tasmota-ir
board = esp8266_4m  ; 修正板型ID，与Tasmota官方定义一致
platform = espressif8266@3.2.0
framework = arduino


[env:tasmota-ir]
extends = env:tasmota
board = esp8266_4m
build_flags =
  ${env:tasmota.build_flags}
  -DTEMPLATE_AUTODETECT=0
  -DMODULE=1
  -DTEMPLATE_GENERIC="{\"NAME\":\"Lerlink_ESP8266_IR\",\"GPIO\":[32,0,0,0,1056,1088,0,0,0,576,0,0,0,0],\"FLAG\":0,\"BASE\":1}"
  -DCFG_HOLDER=999889
