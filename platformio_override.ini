[platformio]
default_envs = tasmota-ir  ; 只编译ESP8266红外固件

; 屏蔽所有ESP32/C3环境，避免冲突
[env:tasmota32]
platform = disabled
[env:tasmota32c3]
platform = disabled

; ESP8266红外编译配置
[env:tasmota-ir]
extends = env:tasmota
board = esp8266_4m  ; 4M Flash（1M改esp01_1m）
platform = espressif8266 @ 3.2.0
build_flags = ${env:tasmota.build_flags} -DMODULE_IR=1
