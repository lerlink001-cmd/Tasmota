name: Build Tasmota Standard Firmware

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install -U pip
          pip install -U platformio

      - name: Build Tasmota Standard (4M)
        run: platformio run -e tasmota-4M

      # 🔥 只复制存在的 .bin 文件，跳过不存在的 .gz，避免报错
      - name: Move firmware to build_output
        run: |
          mkdir -p build_output
          if [ -f .pio/build/tasmota-4M/firmware.bin ]; then
            cp .pio/build/tasmota-4M/firmware.bin build_output/tasmota-4M.bin
          fi
          if [ -f .pio/build/tasmota-4M/firmware.bin.gz ]; then
            cp .pio/build/tasmota-4M/firmware.bin.gz build_output/tasmota-4M.bin.gz
          fi

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: tasmota-4M-firmware
          path: build_output/*.bin
          retention-days: 7
