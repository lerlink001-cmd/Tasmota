
name: Tasmota_build_devel

on:
  workflow_dispatch:

jobs:
  build_esp8266_ir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install PlatformIO
        run: |
          pip install -U platformio
          cp ./platformio_override_sample.ini ./platformio_override.ini

      - name: Build ESP8266 IR
        run: platformio run -e tasmota-ir

      # 只保留你需要的 4 个文件，其他全部排除
      - uses: actions/upload-artifact@v4
        with:
          name: firmwares
          path: |
            .pio/build/tasmota-ir/firmware.bin
            .pio/build/tasmota-ir/firmware.factory.bin
            .pio/build/tasmota-ir/bootloader.bin
            .pio/build/tasmota-ir/partitions.bin


