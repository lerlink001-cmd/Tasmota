name: Build Tasmota Standard Firmware

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive  # 必须，Tasmota 依赖子模块

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install -U pip
          pip install -U platformio

      # 🔥 编译 Tasmota 官方标准 4M 环境
      - name: Build Tasmota Standard (4M)
        run: platformio run -e tasmota-4M

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: tasmota-4M-firmware
          path: build_output/*.bin
