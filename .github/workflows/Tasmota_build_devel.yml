name: Build_development

on:
  workflow_dispatch:      # 手动触发工作流
  push:
    branches: esp8266-ir  # 仅监听esp8266-ir分支的推送（适配你的8266分支）
    paths-ignore:
    - '.github/**'        # 忽略.github目录变更
    - '**.md'             # 忽略md文件变更
    - 'tasmota/berry/**'  # 忽略Berry示例变更

# 确保同一分支仅运行一个编译任务
concurrency:
  group: environment-${{ github.ref }}
  cancel-in-progress: true

jobs:
  be_solidify:
    runs-on: ubuntu-latest
    if: always()  # 强制运行，无视官方仓库限制
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Make Berry and Solidify code
        run: |
          cd lib/libesp32/berry
          make
          cd ../berry_tasmota
          ../berry/berry -s -g solidify_all.be
          cd ../berry_matter
          ../berry/berry -s -g solidify_all.be
          cd ../berry_animation
          ../berry/berry -s -g solidify_all.be
          cd ../../libesp32_lvgl/lv_binding_berry
          ../../libesp32/berry/berry -s -g solidify_all.be
          cd ../lv_haspmota
          ../../libesp32/berry/berry -s -g solidify_all.be
      - uses: actions/upload-artifact@v4
        with:
          name: berry
          path: |
            ./lib/libesp32/berry_tasmota/src/solidify
            ./lib/libesp32/berry_matter/src/solidify
            ./lib/libesp32/berry_animation/src/solidify
            ./lib/libesp32_lvgl/lv_binding_berry/src/solidify
            ./lib/libesp32_lvgl/lv_haspmota/src/solidify
            ./lib/libesp32/berry/generate

  push_solidified:
    needs: be_solidify
    runs-on: ubuntu-latest
    if: always()  # 强制运行
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - uses: actions/download-artifact@v4
        with:
          pattern: berry
          path: berry
      - name: Move solidified Berry files back
        run: |
          ls -R ./berry
          mv berry/berry/libesp32/berry_tasmota/src/solidify/* ./lib/libesp32/berry_tasmota/src/solidify
          mv berry/berry/libesp32/berry_matter/src/solidify/* ./lib/libesp32/berry_matter/src/solidify
          mv berry/berry/libesp32/berry_animation/src/solidify/* ./lib/libesp32/berry_animation/src/solidify
          mv berry/berry/libesp32_lvgl/lv_binding_berry/src/solidify/* ./lib/libesp32_lvgl/lv_binding_berry/src/solidify
          mv berry/berry/libesp32_lvgl/lv_haspmota/src/solidify/* ./lib/libesp32_lvgl/lv_haspmota/src/solidify
          mv berry/berry/libesp32/berry/generate/* ./lib/libesp32/berry/generate
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Solidified Code updated

  safeboot-images:
    needs: push_solidified
    runs-on: ubuntu-latest
    if: always()  # 强制运行
    continue-on-error: true
    strategy:
      matrix:
        variant: []  # 清空ESP32 safeboot编译项

  base-images:
    needs: push_solidified
    runs-on: ubuntu-latest
    if: always()  # 强制运行
    continue-on-error: true
    strategy:
      matrix:
        variant:
          - tasmota-ir  # 仅保留ESP8266红外编译
    steps:
      - uses: actions/checkout@v6
        with:
          ref: esp8266-ir  # 强制拉取esp8266-ir分支代码
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: false
      - name: Install dependencies
        run: |
          uv pip install --system -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip
      - name: Add SHA to footer
        run: |
          COMMIT_SHA_LONG=$(git rev-parse --short HEAD || echo "")
          SHA=${COMMIT_SHA_LONG::7}
          sed -i -e "s/TASMOTA_SHA_SHORT/TASMOTA_SHA_SHORT $SHA-/g" ./tasmota/include/tasmota_version.h
      - name: Run PlatformIO
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: '1'
        run: platformio run -e ${{ matrix.variant }}
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.variant }}
          path: ./build_output

  base32-images:
    needs: safeboot-images
    runs-on: ubuntu-latest
    if: always()  # 强制运行
    continue-on-error: true
    strategy:
      matrix:
        variant: []  # 清空所有ESP32编译项

  language-images:
    needs: safeboot-images
    runs-on: ubuntu-latest
    if: always()  # 强制运行
    continue-on-error: true
    strategy:
      matrix:
        variant: []  # 清空多语言编译项

  Start_final_copy:
    needs: [base-images, base32-images, language-images]
    runs-on: ubuntu-latest
    if: always()  # 强制运行
    env:
      GH_TOKEN: ${{ secrets.API_TOKEN_GITHUB }}
    steps:
    - name: Dispatch workflow (skip for custom build)
      run: echo "Custom ESP8266 IR build completed"  # 跳过官方固件同步，仅提示编译完成
