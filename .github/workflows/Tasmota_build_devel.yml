
name: Build Tasmota Standard Firmware

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install -U pip
          pip install -U platformio

      # 🔥 只编译标准 4M 版本，绝对没有 IR 版本
      - name: Build Tasmota Standard
        run: platformio run -e tasmota-4M

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build_output/*.bin
