# Tasmota ESP8266 IR 专属编译工作流
# 仅编译ESP8266红外固件，强制运行无Skipped，适配非官方仓库
name: Build_development

on:
  workflow_dispatch:      # 支持手动触发
  push:
    branches: [esp8266-ir]  # 仅监听esp8266-ir分支推送
    paths-ignore:
      - '.github/**'        # 忽略.github目录变更
      - '**.md'             # 忽略md文档变更
      - 'tasmota/berry/**'  # 忽略Berry示例代码变更

# 并发控制：同一分支仅运行一个编译任务
concurrency:
  group: environment-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Berry代码固化（依赖任务，保留但强制运行）
  be_solidify:
    runs-on: ubuntu-latest
    if: always()  # 强制运行，突破官方仓库限制
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: 编译并固化Berry代码
        run: |
          cd lib/libesp32/berry
          make
          cd ../berry_tasmota && ../berry/berry -s -g solidify_all.be
          cd ../berry_matter && ../berry/berry -s -g solidify_all.be
          cd ../berry_animation && ../berry/berry -s -g solidify_all.be
          cd ../../libesp32_lvgl/lv_binding_berry && ../../libesp32/berry/berry -s -g solidify_all.be
          cd ../lv_haspmota && ../../libesp32/berry/berry -s -g solidify_all.be
      
      - name: 上传Berry固化产物
        uses: actions/upload-artifact@v4
        with:
          name: berry
          path: |
            ./lib/libesp32/berry_tasmota/src/solidify
            ./lib/libesp32/berry_matter/src/solidify
            ./lib/libesp32/berry_animation/src/solidify
            ./lib/libesp32_lvgl/lv_binding_berry/src/solidify
            ./lib/libesp32_lvgl/lv_haspmota/src/solidify
            ./lib/libesp32/berry/generate

  # 推送固化后的Berry代码
  push_solidified:
    needs: be_solidify
    runs-on: ubuntu-latest
    if: always()  # 强制运行
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      
      - name: 下载Berry固化产物
        uses: actions/download-artifact@v4
        with:
          pattern: berry
          path: berry
      
      - name: 移动固化文件到指定目录
        run: |
          ls -R ./berry
          mv berry/berry/libesp32/berry_tasmota/src/solidify/* ./lib/libesp32/berry_tasmota/src/solidify/
          mv berry/berry/libesp32/berry_matter/src/solidify/* ./lib/libesp32/berry_matter/src/solidify/
          mv berry/berry/libesp32/berry_animation/src/solidify/* ./lib/libesp32/berry_animation/src/solidify/
          mv berry/berry/libesp32_lvgl/lv_binding_berry/src/solidify/* ./lib/libesp32_lvgl/lv_binding_berry/src/solidify/
          mv berry/berry/libesp32_lvgl/lv_haspmota/src/solidify/* ./lib/libesp32_lvgl/lv_haspmota/src/solidify/
          mv berry/berry/libesp32/berry/generate/* ./lib/libesp32/berry/generate/
      
      - name: 提交固化代码更新
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update solidified Berry code for ESP8266 IR

  # 屏蔽ESP32安全启动镜像编译（仅保留空矩阵）
  safeboot-images:
    needs: push_solidified
    runs-on: ubuntu-latest
    if: always()  # 强制运行
    continue-on-error: true
    strategy:
      matrix:
        variant: []

  # 核心：仅编译ESP8266 IR固件
  base-images:
    needs: push_solidified
    runs-on: ubuntu-latest
    if: always()  # 强制运行，无Skipped
    continue-on-error: true
    strategy:
      matrix:
        variant:
          - tasmota-ir  # 仅保留ESP8266红外固件编译
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # 拉取完整提交历史，避免SHA获取失败
      
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      
      - name: 安装uv包管理器
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: false
      
      - name: 安装PlatformIO编译环境
        run: |
          uv pip install --system -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip
      
      - name: 添加编译版本SHA标识
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD || echo "unknown")
          sed -i -e "s/TASMOTA_SHA_SHORT/TASMOTA_SHA_SHORT ${COMMIT_SHA:0:7}-/g" ./tasmota/include/tasmota_version.h
      
      - name: 编译ESP8266 IR固件
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: '1'
        run: platformio run -e ${{ matrix.variant }}
      
      - name: 上传ESP8266 IR固件产物
        uses: actions/upload-artifact@v4
        with:
          name: tasmota-ir-firmware
          path: |
            .pio/build/tasmota-ir/firmware.bin
            ./build_output

  # 屏蔽ESP32基础镜像编译（仅保留空矩阵）
  base32-images:
    needs: safeboot-images
    runs-on: ubuntu-latest
    if: always()  # 强制运行
    continue-on-error: true
    strategy:
      matrix:
        variant: []

  # 屏蔽多语言固件编译（仅保留空矩阵）
  language-images:
    needs: safeboot-images
    runs-on: ubuntu-latest
    if: always()  # 强制运行
    continue-on-error: true
    strategy:
      matrix:
        variant: []

  # 编译完成提示（简化收尾，无官方仓库依赖）
  Start_final_copy:
    needs: [base-images, base32-images, language-images]
    runs-on: ubuntu-latest
    if: always()  # 强制运行
    steps:
      - name: 编译完成提示
        run: |
          echo "✅ ESP8266 IR固件编译完成！"
          echo "📦 固件文件可在 Artifacts → tasmota-ir-firmware 中下载"
