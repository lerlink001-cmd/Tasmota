# 工作流名称
name: Build Tasmota ESP32-C3 Firmware

# 触发方式：手动触发（workflow_dispatch）
on:
  workflow_dispatch:

# 定义构建任务
jobs:
  build-firmware:
    # 运行环境：最新版 Ubuntu
    runs-on: ubuntu-latest
    
    # 构建步骤
    steps:
      # 步骤1：拉取代码（强制递归拉取所有子模块）
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'       # 递归拉取所有子模块
          fetch-depth: 0                # 拉取完整提交历史，避免子模块拉取不全
          persist-credentials: true     # 保留凭证，确保子模块拉取权限

      # 步骤2：强制更新所有嵌套子模块（关键！解决层级子模块缺失）
      - name: Force update all nested submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --force
          # 确保所有子模块切换到正确的提交版本
          git submodule foreach --recursive git checkout HEAD

      # 步骤3：配置 Python 环境
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"        # 适配 PlatformIO 的稳定版本
          cache: "pip"                  # 缓存 pip 依赖，加速构建

      # 步骤4：安装 PlatformIO（编译 ESP32 固件的核心工具）
      - name: Install PlatformIO Core
        run: |
          python -m pip install --upgrade pip
          pip install platformio
          # 验证 PlatformIO 安装
          pio --version

      # 步骤5：编译 ESP32-C3 固件
      - name: Build Tasmota32-C3 firmware
        run: |
          cd tasmota                    # 进入 Tasmota 源码目录
          # 编译 ESP32-C3 固件（指定编译环境）
          pio run -e tasmota32c3
          # 验证编译产物
          ls -la .pio/build/tasmota32c3/*.bin

      # 步骤6：上传编译好的固件（方便下载）
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: tasmota32c3-firmware    # 产物名称
          path: |                       # 固件文件路径
            tasmota/.pio/build/tasmota32c3/*.bin
          retention-days: 30            # 产物保留30天
